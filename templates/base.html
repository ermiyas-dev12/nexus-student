<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusStudent — {% block title %}International Student Hub{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
{% block extra_css %}{% endblock %}
</head>
<body>

<nav>
  <div class="logo">Nexus<span>Student</span></div>
  <ul class="nav-links">
    <li>
      <a href="{{ url_for('home') }}"
         class="{{ 'active' if request.endpoint == 'home' }}">
        Home
      </a>
    </li>
    <li>
      <a href="{{ url_for('chatbot') }}"
         class="{{ 'active' if request.endpoint == 'chatbot' }}">
        AI Assistant
      </a>
    </li>
    <li>
      <a href="{{ url_for('resources') }}"
         class="{{ 'active' if request.endpoint == 'resources' }}">
        Resources
      </a>
    </li>
    <li>
      <a href="{{ url_for('community') }}"
         class="{{ 'active' if request.endpoint == 'community' }}">
        Community
      </a>
    </li>
    <li>
      <a href="{{ url_for('emergency') }}"
         class="{{ 'active' if request.endpoint == 'emergency' }}">
        Emergency
      </a>
    </li>
    <li>
      <a class="nav-cta" href="#">Sign Up</a>
    </li>
  </ul>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<script src="{{ url_for('static', filename='main.js') }}"></script>
{% block extra_js %}{% endblock %}

</body>
</html>
